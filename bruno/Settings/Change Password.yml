info:
  name: Change Password
  type: http
  seq: 2

http:
  method: PUT
  url: "{{BaseURL}}/auth/profile/password"
  body:
    type: json
    data: |-
      {
        "currentPassword": "{{demoPassword}}",
        "newPassword": "demo1234new"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Requires an active session. `newPassword` must differ from `currentPassword` and be at least 6 characters.
