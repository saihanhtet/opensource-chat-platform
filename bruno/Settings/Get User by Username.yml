info:
  name: Get User by Username
  type: http
  seq: 4

http:
  method: GET
  url: "{{BaseURL}}/auth/users/by-username/{{lookupUsername}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Set `lookupUsername` in collection variables (e.g. `alice` for seed user `alice@demo.local`). Returns public profile fields for that username.
