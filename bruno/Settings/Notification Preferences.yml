info:
  name: Notification Preferences
  type: http
  seq: 3

http:
  method: PUT
  url: "{{BaseURL}}/auth/notification-preferences"
  body:
    type: json
    data: |-
      {
        "toastMessages": true,
        "toastFriendRequests": true,
        "toastTeamUpdates": true,
        "toastTeamMembership": true,
        "toastDurationSeconds": 4
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Send at least one field. All fields are optional in the schema but the object must not be empty. Integers for `toastDurationSeconds` must be between 2 and 30.
