info:
  name: Set Typing Status
  type: http
  seq: 8

http:
  method: POST
  url: "{{BaseURL}}/conversations/{{conversationId}}/typing"
  body:
    type: json
    data: |-
      {
        "isTyping": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Body: `{ "isTyping": boolean }`. Use `false` to clear typing for the current user.
