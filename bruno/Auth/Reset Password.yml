info:
  name: Reset Password
  type: http
  seq: 8

http:
  method: POST
  url: "{{BaseURL}}/auth/reset-password"
  body:
    type: json
    data: |-
      {
        "token": "{{resetToken}}",
        "password": "{{signupPassword}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Set `resetToken` from the password-reset email link (`?token=...`). Use a new password if you intend to sign in afterward.
