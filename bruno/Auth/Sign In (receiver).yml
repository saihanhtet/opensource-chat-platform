info:
  name: Sign In (receiver for FR)
  type: http
  seq: 6

http:
  method: POST
  url: "{{BaseURL}}/auth/sign-in"
  body:
    type: json
    data: |-
      {
        "email": "{{demoEmailReceiver}}",
        "password": "{{demoPassword}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
