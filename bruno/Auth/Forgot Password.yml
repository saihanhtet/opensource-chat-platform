info:
  name: Forgot Password
  type: http
  seq: 7

http:
  method: POST
  url: "{{BaseURL}}/auth/forgot-password"
  body:
    type: json
    data: |-
      {
        "email": "{{demoEmail}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Always returns a generic success message if the account exists or not (avoid email enumeration).
  In non-test environments, a reset email is sent when the user exists. Copy the `token` query param from the reset link into collection variable `resetToken` for **Reset Password**.
