info:
  name: Create Member (join or invite)
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseURL}}/team-members"
  body:
    type: json
    data: |-
      {
        "teamId": "{{teamId}}",
        "userId": "{{myUserId}}",
        "memberRole": "member",
        "status": "active"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
